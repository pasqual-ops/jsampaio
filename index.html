}

function embaralhar(array){
  return array.sort(()=>Math.random()-0.5);
}

function start(){
  nome = document.getElementById("nome").value || gerarNome();
  escola = document.getElementById("escola").value || "Desconhecida";

  // embaralha as perguntas
  perguntas.sort(()=>Math.random()-0.5);

  // embaralha as alternativas
  perguntas.forEach(p=>{
    let resposta = p.o[p.c];
    p.o = embaralhar(p.o);
    p.c = p.o.indexOf(resposta);
  });

  document.getElementById("inicio").style.display="none";
  document.getElementById("quiz").style.display="block";

  show();
}

function show(){
  resp=null;
  document.getElementById("confirmar").disabled=true;
  document.getElementById("confirmar").style.display="block";
  document.getElementById("proxima").style.display="none";
  document.getElementById("res").innerText="";

  let p=perguntas[i];
  document.getElementById("placar").innerText=`${i+1}/${perguntas.length} | ${pontos} pontos`;

  let op=document.getElementById("opcoes");
  document.getElementById("pergunta").innerText=p.p;
  op.innerHTML="";

  p.o.forEach((e,idx)=>{
    let b=document.createElement("button");
    b.className="opcao";
    b.innerText=e;

    b.onclick=()=>{
      resp=idx;
      document.querySelectorAll(".opcao").forEach(btn=>{
        btn.classList.remove("selecionada");
      });
      b.classList.add("selecionada");
      document.getElementById("confirmar").disabled=false;
    }
    op.appendChild(b);
  });
}

function check(){
  let botoes = document.querySelectorAll(".opcao");

  botoes.forEach((btn, idx)=>{
    if(idx == perguntas[i].c){
      btn.classList.add("correta");
    } else if(idx == resp){
      btn.classList.add("errada");
    }
  });

  if(resp==perguntas[i].c){
    pontos++;
    document.getElementById("res").innerText="Acertou 😄";
  }else{
    document.getElementById("res").innerText="Errou 😅";
  }

  document.getElementById("confirmar").style.display="none";
  document.getElementById("proxima").style.display="block";
}

function next(){
  i++;
  if(i<perguntas.length){
    show();
  }else{
    fim();
  }
}

function fim(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("fim").style.display="block";

  let total = perguntas.length;
  let porcentagem = Math.round((pontos / total) * 100);

  document.getElementById("final").innerHTML =
  `
  ${nome}, você fez <b>${pontos}</b> pontos de ${total}!<br><br>
  📊 Você acertou <b>${porcentagem}%</b> das perguntas.
  `;

  salvarRanking();
  mostrarRanking();
}

function salvarRanking(){
  let ranking = JSON.parse(localStorage.getItem("rankingQuiz")) || [];

  ranking.push({
    nome: nome,
    escola: escola,
    pontos: pontos
  });

  ranking.sort((a,b)=> b.pontos - a.pontos);
  ranking = ranking.slice(0,10);

  localStorage.setItem("rankingQuiz", JSON.stringify(ranking));
}

function mostrarRanking(){
  let ranking = JSON.parse(localStorage.getItem("rankingQuiz")) || [];
  let texto="";

  ranking.forEach((j,index)=>{
    texto += `
    ${index+1}º 🏆 ${j.nome}
    <br>
    🏫 ${j.escola} | ⭐ ${j.pontos} pontos
    <br><br>
    `;
  });

  document.getElementById("ranking").innerHTML = texto;
}

function restart(){
  i=0;
  pontos=0;
  document.getElementById("fim").style.display="none";
  document.getElementById("inicio").style.display="block";
  document.getElementById("nome").value = "";
  document.getElementById("escola").value = "";
}

</script>
</body>
